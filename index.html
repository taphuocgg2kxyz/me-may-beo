<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quzxyz Chess Bot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Chơi Cờ Vua Với Bot</h1>
        
        <div class="game-container">
            <div id="myBoard" style="width: 400px; max-width: 100%;"></div>

            <div class="controls">
                <h3>Bảng Điều Khiển</h3>
                <div class="status-box">
                    <p id="status">Lượt của bạn (Trắng)</p>
                </div>
                
                <div class="setting-group">
                    <label for="difficulty">Độ khó (Level):</label>
                    <select id="difficulty">
                        <option value="1">Dễ (Level 1)</option>
                        <option value="3" selected>Trung bình (Level 3)</option>
                        <option value="5">Khó (Level 5)</option>
                    </select>
                </div>

                <button id="restartBtn" class="btn">Chơi Lại</button>
                <button id="flipBtn" class="btn">Đổi Bên (Đen/Trắng)</button>
                <button id="hintBtn" class="btn hint-btn">Gợi Ý Nước Đi</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
